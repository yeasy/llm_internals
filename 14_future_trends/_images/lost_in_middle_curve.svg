<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 26px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .text { font: 16px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #475569; }
      .axis { stroke: #64748b; stroke-width: 2; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#f8fafc"/>
  <text class="title" x="70" y="70">Lost in the Middle: U-shaped retrieval curve</text>
  <text class="small" x="70" y="98">Representative curve: primacy and recency remain stronger than middle-context retrieval.</text>

  <line class="axis" x1="170" y1="620" x2="980" y2="620" marker-end="url(#arrow)"/>
  <line class="axis" x1="170" y1="620" x2="170" y2="160" marker-end="url(#arrow)"/>

  <line class="grid" x1="170" y1="540" x2="980" y2="540"/>
  <line class="grid" x1="170" y1="460" x2="980" y2="460"/>
  <line class="grid" x1="170" y1="380" x2="980" y2="380"/>
  <line class="grid" x1="170" y1="300" x2="980" y2="300"/>
  <line class="grid" x1="170" y1="220" x2="980" y2="220"/>

  <text class="label" x="500" y="682">Relevant information position</text>
  <text class="label" x="90" y="390" transform="rotate(-90 90 390)">Accuracy</text>

  <text class="small" x="170" y="645">start</text>
  <text class="small" x="540" y="645">middle</text>
  <text class="small" x="930" y="645">end</text>
  <text class="small" x="130" y="545">50%</text>
  <text class="small" x="130" y="465">60%</text>
  <text class="small" x="130" y="385">70%</text>
  <text class="small" x="130" y="305">80%</text>
  <text class="small" x="130" y="225">90%</text>

  <polyline fill="none" stroke="#2563eb" stroke-width="6" points="190,260 300,330 420,430 570,500 730,390 860,280 960,240"/>
  <circle cx="190" cy="260" r="7" fill="#2563eb"/>
  <circle cx="570" cy="500" r="7" fill="#2563eb"/>
  <circle cx="960" cy="240" r="7" fill="#2563eb"/>

  <rect x="760" y="360" width="290" height="150" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="18"/>
  <text class="label" x="790" y="400">Interpretation</text>
  <text class="text" x="790" y="432">Start: task framing and primacy bias</text>
  <text class="text" x="790" y="460">Middle: weakest retrieval and reasoning</text>
  <text class="text" x="790" y="488">End: recency bias keeps performance higher</text>
</svg>
