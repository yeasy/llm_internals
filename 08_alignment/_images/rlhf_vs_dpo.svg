<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 26px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 12; }
      .highlight { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 12; }
      .accent { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 12; }
      .warn { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.5; rx: 12; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .text { font: 16px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#f8fafc"/>
  <text class="title" x="80" y="70">RLHF vs DPO: two preference optimization pipelines</text>
  <text class="small" x="80" y="98">Both start from preference data, but DPO absorbs the reward-model step into a direct classification loss.</text>

  <rect class="lane" x="60" y="140" width="500" height="560"/>
  <text class="label" x="90" y="184">RLHF</text>
  <rect class="box" x="90" y="220" width="170" height="64"/>
  <rect class="box" x="90" y="330" width="170" height="64"/>
  <rect class="warn" x="90" y="440" width="170" height="64"/>
  <rect class="accent" x="90" y="550" width="170" height="64"/>
  <rect class="box" x="320" y="220" width="180" height="64"/>
  <rect class="box" x="320" y="330" width="180" height="64"/>
  <rect class="warn" x="320" y="440" width="180" height="64"/>
  <rect class="accent" x="320" y="550" width="180" height="64"/>
  <text class="text" x="132" y="258">SFT model</text>
  <text class="text" x="120" y="368">sample outputs</text>
  <text class="text" x="135" y="478">reward model</text>
  <text class="text" x="120" y="588">policy update</text>
  <text class="text" x="350" y="258">preference pairs</text>
  <text class="text" x="380" y="368">reward scores</text>
  <text class="text" x="367" y="478">PPO + KL control</text>
  <text class="text" x="350" y="588">aligned policy</text>
  <line x1="175" y1="284" x2="175" y2="330" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="175" y1="394" x2="175" y2="440" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="175" y1="504" x2="175" y2="550" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="260" y1="252" x2="320" y2="252" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="260" y1="362" x2="320" y2="362" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="260" y1="472" x2="320" y2="472" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="260" y1="582" x2="320" y2="582" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text class="small" x="94" y="650">More moving parts: sampling loop, reward fitting, policy-gradient tuning.</text>

  <rect class="lane" x="640" y="140" width="500" height="560"/>
  <text class="label" x="670" y="184">DPO</text>
  <rect class="highlight" x="670" y="220" width="180" height="64"/>
  <rect class="highlight" x="670" y="330" width="180" height="64"/>
  <rect class="accent" x="670" y="440" width="180" height="64"/>
  <rect class="accent" x="670" y="550" width="180" height="64"/>
  <rect class="box" x="900" y="220" width="180" height="64"/>
  <rect class="box" x="900" y="330" width="180" height="64"/>
  <rect class="accent" x="900" y="440" width="180" height="64"/>
  <rect class="accent" x="900" y="550" width="180" height="64"/>
  <text class="text" x="712" y="258">policy model</text>
  <text class="text" x="700" y="368">chosen / rejected</text>
  <text class="text" x="690" y="478">log-prob ratio</text>
  <text class="text" x="688" y="588">aligned policy</text>
  <text class="text" x="955" y="258">reference model</text>
  <text class="text" x="944" y="368">reference logits</text>
  <text class="text" x="948" y="478">sigmoid loss</text>
  <text class="text" x="940" y="588">no reward model</text>
  <line x1="760" y1="284" x2="760" y2="330" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="760" y1="394" x2="760" y2="440" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="760" y1="504" x2="760" y2="550" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="850" y1="252" x2="900" y2="252" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="850" y1="362" x2="900" y2="362" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="850" y1="472" x2="900" y2="472" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="850" y1="582" x2="900" y2="582" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text class="small" x="674" y="650">Direct objective: optimize preferences with a supervised-style contrastive loss.</text>
</svg>
